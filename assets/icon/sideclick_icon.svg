<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient: deep indigo -> app blue -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2B3A8F"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <!-- Primary tile gradient -->
    <linearGradient id="primary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#DCE7FF"/>
    </linearGradient>
    <!-- Sidekick tile gradient (the companion) -->
    <linearGradient id="sidekick" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7CB0FF"/>
      <stop offset="1" stop-color="#4C8DF6"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0B1B4A" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Rounded-square app backdrop (macOS/iOS masking handles corners too) -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" fill="url(#bg)"/>

  <!-- Two companion tiles: a large primary and a smaller "sidekick" beside it -->
  <g filter="url(#softShadow)">
    <!-- Primary tile (represents the main workspace) -->
    <rect x="238" y="300" width="330" height="424" rx="70" fill="url(#primary)"/>

    <!-- Sidekick tile (the companion), overlapping to read as a pair -->
    <rect x="512" y="392" width="272" height="332" rx="60" fill="url(#sidekick)"/>
  </g>

  <!-- Click / cursor mark on the sidekick tile -->
  <g transform="translate(566, 452)">
    <!-- Concentric click ripple -->
    <circle cx="90" cy="118" r="118" fill="none" stroke="#FFFFFF" stroke-opacity="0.28" stroke-width="16"/>
    <!-- Arrow cursor -->
    <path d="M40 40 L40 196 L86 150 L118 214 L150 198 L118 134 L182 134 Z"
          fill="#FFFFFF" stroke="#2B3A8F" stroke-width="10" stroke-linejoin="round"/>
  </g>

  <!-- Subtle plus/link accent on primary tile hinting 'companion to' -->
  <g fill="#3B82F6" opacity="0.9">
    <rect x="352" y="452" width="104" height="26" rx="13"/>
    <rect x="391" y="413" width="26" height="104" rx="13"/>
  </g>
</svg>
